name: Azure => Build and Deploy Static Web App

on:
  push:
    branches:
      - main  # Trigger the workflow on push to the main branch
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout GitHub repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'  # Use the appropriate Node.js version for your Angular app

    - name: Install dependencies
      run: |
        cd client
        npm install --legacy-peer-deps

    - name: Build Angular app
      run: |
        cd client
        npm run build --prod

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v2
      with:
        name: angular-app
        path: client/dist/client/browser # Update with the path to your Angular app’s build output

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: 'production'
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v2
      with:
        name: angular-app
        path: ./build

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_STONE_0F768D10F }}
        repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e. PR comments)
        action: 'upload'
        app_location: 'client' # App base directory
        output_location: 'build/client/browser' # Path to your build directory from the repository root
        api_location: '' # Optional: if you have an API backend, specify the directory for the API source code here

    - name: Cleanup
      run: rm -rf ./build
