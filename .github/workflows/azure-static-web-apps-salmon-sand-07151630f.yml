name: Azure => Build, Deploy and Cleanup Static Web App

on:
  push:
    branches:
      - feature/azure-storage  # Trigger the workflow on push to the feature/azure-storage branch
    paths:
      - 'client/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - feature/azure-storage
    paths:
      - 'client/**'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'  # Use the appropriate Node.js version for your Angular app

      - name: npm install, build
        working-directory: client
        run: |
          npm install --legacy-peer-deps
          npm run build --configuration=production

      - name: Zip artifact for deployment
        run: zip -r release.zip ./client/dist/client/browser/* # zip only the client/dist folder
  
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-upload
    environment:
      name: 'Production'
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip -d ./deploy
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_SAND_07151630F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}  # Used for GitHub integrations (i.e. PR comments)
          action: 'upload'
          app_location: '/'  # Adjust this if your app is located in a subdirectory, e.g., '/client'
          output_location: ./deploy/client/dist/client/browser # Update the path to the unzipped deployment directory

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Clean up artifacts and publish directory
        uses: actions/checkout@v4
        with:
          clean: true

