name: Azure Build and Deploy Static Web App

on:
  push:
    branches:
      - feature/azure-storage  # Trigger the workflow on push to the feature/azure-storage branch
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - feature/azure-storage

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout GitHub repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  # Use the appropriate Node.js version for your Angular app

    - name: Install dependencies
      run: |
        cd client
        npm install --legacy-peer-deps

    - name: Build Angular app
      run: |
        cd client
        npm run build --prod

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v2
      with:
        name: angular-app
        path: client/dist/client/browser  # Adjusted path to your Angular app’s build output

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-upload
    environment: 'production'
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v2
      with:
        name: angular-app
        path: client/dist/client/browser  # Adjusted path to match the uploaded artifact location

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_DUNE_0AD40740F }}
        repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e. PR comments)
        action: 'upload'
        app_location: '/'  # Adjust as per your Azure Static Web Apps configuration
        output_location: 'client/dist/client/browser'  # Path to your build directory from the repository root

    - name: Cleanup
      run: rm -rf client/dist  # Adjusted cleanup path to remove the Angular build directory
