<div class="page">
  @if (!commonService.isCreatingMessageSig()) {
    <ngx-spinner type="ball-atom">
      <p>Loading...</p>
    </ngx-spinner>
  }

  <section class="container">
    @if (!commonService.isMemberMessageCompSig()) {
      <header>
        <nav>
          @if (isMobileView$ | async) {
            <app-nav-mobile/>
          } @else {
            <app-navbar/>
          }
        </nav>
      </header>
    }

    <main
      [ngClass]="{ 'main-no-padding-margin': commonService.isMessageCompSig() || commonService.isMemberMessageCompSig()}">
      <div class="wrapper">
        <router-outlet/>
      </div>
    </main>

    <!--    hide in memberMessageComp mobile view-->
    @if (!commonService.isMemberMessageCompSig()) {
      <footer>
        <app-footer/>
      </footer>
    }
  </section>
</div>
