<main>
  <section class="member-container">
    <div class="members">
      @for (member of members; track $index) {
        <app-member-card-mobile [memberIn]="member"/>
      }
    </div>
    @if (pagination && memberParams) {
      <mat-paginator class="paginator" #paginator (page)="handlePageEvent($event)" [length]="pagination.totalItems"
                     [pageSize]="memberParams.pageSize" [disabled]="false" [showFirstLastButtons]="showFirstLastButtons"
                     [pageSizeOptions]="showPageSizeOptions ? pageSizeOptions : []" [hidePageSize]="hidePageSize"
                     [pageIndex]="memberParams.pageNumber - 1" aria-label="Select page" class="paginator">
        <!-- pageIndex must start from 0 -->
      </mat-paginator>
    }
  </section>
  <section class="buttons">
    <button (click)="openOrderBottomSheet()" mat-raised-button>Sort by</button>
    <button (click)="openFilterBottomSheet()" mat-raised-button>Filter by</button>
    <button (click)="initResetMemberParams(); getMembers();" color="warn" mat-stroked-button>Reset</button>
  </section>
</main>
