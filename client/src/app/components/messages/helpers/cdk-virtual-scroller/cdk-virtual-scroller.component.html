@if(messagesIn) {
<cdk-virtual-scroll-viewport [minBufferPx]="bufferSize" [maxBufferPx]="bufferSize" itemSize="{{defaultItemSize}}"
    class="messages-container">
    <div *cdkVirtualFor="let message of messagesIn" class="item">
        <img ngSrc="{{message.userOrTargetProfilePhoto}}" priority width="{{photo_WH}}" height="{{photo_WH}}"
            alt="{{message.userOrTargetUserName[0]}}">
        <div class="details">
            <div class="row1">
                <p>{{message.userOrTargetUserName | shortenString: 15}}</p>
                <p class="date">{{message.sentOn | date}}</p>
            </div>
            <div class="row2">{{message.content| shortenString: isMobileSig() ? 22 : 50}}</div>
        </div>
    </div>
</cdk-virtual-scroll-viewport>
}
