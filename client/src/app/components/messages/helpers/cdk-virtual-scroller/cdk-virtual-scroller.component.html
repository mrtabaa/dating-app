<!-- <cdk-virtual-scroll-viewport (scrolledIndexChange)="loadOlderMessages($event)" [minBufferPx]="bufferSize" -->
@if(messagesIn) {
<cdk-virtual-scroll-viewport [minBufferPx]="bufferSize" [maxBufferPx]="bufferSize" itemSize="50"
    class="messages-container">
    <div *cdkVirtualFor="let message of messagesIn" class="item">
        <div class="details">
            <li class="title">
                <p>{{message.sentOn | date}}</p>
                @if(message.userOrTargetUserName !== memberIn?.userName) {
                <mat-icon [ngStyle]="{'color': message.readOn ? 'green' : 'red'}">
                    {{message.readOn ? 'done_all' : 'check'}}
                </mat-icon>
                }
            </li>
            <li class="content">{{message.content}}</li>
        </div>
        <img ngSrc="{{message.userOrTargetProfilePhoto}}" priority width="{{photo_WH}}" height="{{photo_WH}}"
            alt="{{message.userOrTargetUserName}}">
    </div>
</cdk-virtual-scroll-viewport>
}
