<main>
    @if(messages.length === 0) {
    <div class="warning-layout-helper">.</div>
    <h5 class="warning">
        This box is empty.
    </h5>
    }
    @else {
    <mat-tab-group #tabGroup (selectedIndexChange)="setSelectTabIndex($event)" mat-stretch-tabs="true"
        disablePagination="true">
        <mat-tab #inbox>
            <div class="tab-container">
                <ng-template mat-tab-label>
                    <mat-icon [color]="inbox.isActive ? 'primary' : ''">inbox</mat-icon>
                </ng-template>
                <app-cdk-virtual-scroller [messagesIn]="messages" [memberIn]="memberIn" />
            </div>
        </mat-tab>
        <mat-tab #unread>
            <div class="tab-container">
                <ng-template mat-tab-label>
                    <mat-icon [color]="unread.isActive ? 'primary' : ''">mark_email_unread</mat-icon>
                </ng-template>
            </div>
        </mat-tab>
        <mat-tab #read>
            <ng-template mat-tab-label>
                <mat-icon [color]="read.isActive ? 'primary' : ''">mark_as_unread</mat-icon>
            </ng-template>
        </mat-tab>
        <mat-tab #sent>
            <ng-template mat-tab-label>
                <mat-icon [color]="sent.isActive ? 'primary' : ''">send</mat-icon>
            </ng-template>
        </mat-tab>
    </mat-tab-group>
    }
</main>
